<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="macDNIe">
  <title>macDNIe</title>
  <!-- macDNIe mark: a hand-drawn apple (the platform) fused with a smart-card
       contact chip (the DNIe). Graphite body, chip-gold plate + leaf. Not Apple's
       trademarked glyph; an original silhouette. -->
  <!-- leaf -->
  <path d="M33 17 C 37 9.5, 46 9, 46 9 C 46 9, 45 17.5, 38.5 20 C 35.3 21.1, 33.4 19.6, 33 17 Z" fill="#9c7616"/>
  <!-- stem -->
  <path d="M31.4 18.5 C 30.8 14.5, 30.2 12, 28.4 10" fill="none" stroke="#191b1f" stroke-width="2.1" stroke-linecap="round"/>
  <!-- apple body (two lobes, top dimple) -->
  <path d="M32 21.5 C 26.5 13.8, 14 12.8, 10.5 23.2 C 7.4 32.4, 11.6 50.8, 23 54.2 C 27 55.4, 29.9 53.6, 32 53.6 C 34.1 53.6, 37 55.4, 41 54.2 C 52.4 50.8, 56.6 32.4, 53.5 23.2 C 50 12.8, 37.5 13.8, 32 21.5 Z" fill="#191b1f"/>
  <!-- smart-card contact plate -->
  <rect x="22.3" y="30" width="19.4" height="14.6" rx="2.4" fill="#c79a2e"/>
  <!-- chip pad pattern -->
  <g stroke="#17130a" stroke-width="1.3" fill="none" opacity="0.9">
    <rect x="27.4" y="33.2" width="9.2" height="8.2" rx="1.3"/>
    <line x1="22.3" y1="37.3" x2="27.4" y2="37.3"/>
    <line x1="36.6" y1="37.3" x2="41.7" y2="37.3"/>
    <line x1="32" y1="30" x2="32" y2="33.2"/>
    <line x1="32" y1="41.4" x2="32" y2="44.6"/>
  </g>
</svg>
