<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <!-- macdnie.com Open Graph card. Regenerate og.png with:
       rsvg-convert -w 1200 -h 630 assets/og-source.svg -o og.png -->
  <rect width="1200" height="630" fill="#121419"/>
  <!-- faint guilloché arcs -->
  <g fill="none" stroke="#e8e5da" stroke-opacity="0.045" stroke-width="1.5">
    <circle cx="1210" cy="640" r="180"/>
    <circle cx="1210" cy="640" r="240"/>
    <circle cx="1210" cy="640" r="300"/>
    <circle cx="1210" cy="640" r="360"/>
    <circle cx="1210" cy="640" r="420"/>
    <circle cx="-10" cy="-20" r="160"/>
    <circle cx="-10" cy="-20" r="220"/>
    <circle cx="-10" cy="-20" r="280"/>
  </g>
  <!-- the mark: apple + smart-card chip (scaled from app/src/logo.svg) -->
  <g transform="translate(88,120) scale(3.4)">
    <path d="M33 17 C 37 9.5, 46 9, 46 9 C 46 9, 45 17.5, 38.5 20 C 35.3 21.1, 33.4 19.6, 33 17 Z" fill="#d7a637"/>
    <path d="M31.4 18.5 C 30.8 14.5, 30.2 12, 28.4 10" fill="none" stroke="#e8e5da" stroke-width="2.1" stroke-linecap="round"/>
    <path d="M32 21.5 C 26.5 13.8, 14 12.8, 10.5 23.2 C 7.4 32.4, 11.6 50.8, 23 54.2 C 27 55.4, 29.9 53.6, 32 53.6 C 34.1 53.6, 37 55.4, 41 54.2 C 52.4 50.8, 56.6 32.4, 53.5 23.2 C 50 12.8, 37.5 13.8, 32 21.5 Z" fill="#e8e5da"/>
    <rect x="22.3" y="30" width="19.4" height="14.6" rx="2.4" fill="#c79a2e"/>
    <g stroke="#17130a" stroke-width="1.3" fill="none" opacity="0.9">
      <rect x="27.4" y="33.2" width="9.2" height="8.2" rx="1.3"/>
      <line x1="22.3" y1="37.3" x2="27.4" y2="37.3"/>
      <line x1="36.6" y1="37.3" x2="41.7" y2="37.3"/>
      <line x1="32" y1="30" x2="32" y2="33.2"/>
      <line x1="32" y1="41.4" x2="32" y2="44.6"/>
    </g>
  </g>
  <!-- wordmark + tagline -->
  <g font-family="Helvetica Neue, Helvetica, Arial, sans-serif">
    <text x="330" y="240" font-size="104" font-weight="bold" letter-spacing="-3" fill="#e8e5da">mac<tspan fill="#d7a637">DNIe</tspan></text>
    <text x="334" y="308" font-size="34" fill="#9a9c9f">Tu DNIe y tu Mac, por fin se entienden.</text>
  </g>
  <!-- transcript strip -->
  <g font-family="Menlo, Courier New, monospace" font-size="24" fill="#9a9c9f">
    <text x="92" y="462">» DNIe detectado — generación 3.0</text>
    <text x="92" y="508">» canal seguro CWA-14890 establecido · <tspan fill="#d7a637">9000</tspan> <tspan fill="#4fb07f">✓</tspan></text>
    <text x="92" y="554">» firmado (PAdES) · sello de tiempo RFC-3161 <tspan fill="#4fb07f">✓</tspan></text>
  </g>
  <!-- footer line -->
  <g font-family="Menlo, Courier New, monospace" font-size="20" fill="#63666c">
    <text x="92" y="600">macdnie.com · producto no oficial · sin telemetría</text>
  </g>
  <!-- gold baseline: the contact strip -->
  <rect x="0" y="622" width="1200" height="8" fill="#d7a637"/>
</svg>
